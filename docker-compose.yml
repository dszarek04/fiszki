services:
  fiszki:
    build:
      context: .
      dockerfile: Dockerfile
    # Expose the container on a host port so portless can route to it.
    # portless alias fiszki <port>  →  https://fiszki.localhost
    ports:
      - "${PORT:-3001}:3000"
    environment:
      NODE_ENV: production
    restart: unless-stopped
